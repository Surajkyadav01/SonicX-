<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

  <body>
  <!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="spotify-app">
      
       <header class="top-tags">
    <span class="tag profile">S</span>
    <span class="tag active">All</span>
    <span class="tag">Music</span>
    <span class="tag">Podcasts</span>
    
    <span class="sonic-logo">Sonic<span class="x-pink">X</span></span>
</header>

            
            

        <main class="main-content">
            <div class="search-wrapper">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search for songs...">
                </div>
                <button class="search-btn" onclick="searchSongs()">Search</button>
            </div>

        <section id="resultsSection" style="display:none; margin-bottom: 30px; position: relative;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="color: #1db954;">Search Results</h3>
        <i class="fas fa-times" onclick="clearSearch()" style="cursor: pointer; color: #b3b3b3; font-size: 20px; padding-right: 10px;"></i>
    </div>
    <div id="apiResults" class="grid-2x4">
        </div>
    <hr style="border: 0.1px solid #333; margin-top: 20px;">
</section>
    
          
          
            <h3>Your Favorites</h3>
            <section class="section">
                <div class="grid-2x4" id="fixedGrid">
                    <div class="mini-card" onclick="playSong('https://image2url.com/r2/default/audio/1773862358460-04c98278-5f8a-42eb-84fc-5a2725949623.mp3', 'Teri Hogaiyaan', 'Vishal Mishra', 'https://image2url.com/r2/default/images/1773862409110-24818e4e-59f9-486e-a461-b4f420786bf9.jpg')">
                        <img src="https://image2url.com/r2/default/images/1773862409110-24818e4e-59f9-486e-a461-b4f420786bf9.jpg" alt="">
                        <div class="card-text">
                            <span>Teri Hogaiyaan</span>
                            <small>Vishal Mishra</small>
                        </div>
                    </div>

                    <div class="mini-card" onclick="playSong('https://image2url.com/r2/default/audio/1773863766875-ff5a1da7-fa34-4a22-8bd8-8e97c524237e.mp3', 'Phir Bhi Tumko Chaahunga', 'Arijit Singh & Shashaa Tirupati', 'https://image2url.com/r2/default/images/1773863572773-8f31b0fb-71b0-4e9d-b91d-2fa1d7e33b1c.jpg')">
                        <img src="https://image2url.com/r2/default/images/1773863572773-8f31b0fb-71b0-4e9d-b91d-2fa1d7e33b1c.jpg" alt="">
                        <div class="card-text">
                            <span>Phir Bhi Tumko...</span>
                            <small>Arijit Singh</small>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section">
                <h3>Recommended for today</h3>
                <div class="grid-2x4"> 
                    <div class="mini-card" onclick="playSong('https://image2url.com/r2/default/audio/1773866292593-eeb5fc72-d3b0-4e77-9a8d-0c3076fec763.mp3', 'Sanson Ki Mala', 'Rahat Fateh Ali Khan', 'https://image2url.com/r2/default/images/1773866445142-a5076e4b-a813-4553-9de7-72170dc2c85f.jpg')">
                        <img src="https://image2url.com/r2/default/images/1773866445142-a5076e4b-a813-4553-9de7-72170dc2c85f.jpg">
                        <div class="card-text">
                            <span>Sanson Ki Mala</span>
                            <small>Rahat Fateh Ali Khan</small>
                        </div>
                    </div>
                    <div class="mini-card" onclick="playSong('https://image2url.com/r2/default/audio/1773866515382-37a07c64-a3a1-40e4-a311-a97cba1f50f1.mp3', 'Chaap Tilak', 'Nakash Aziz', 'https://image2url.com/r2/default/images/1773866751399-f93751a0-62b4-4dd4-811d-3f02024650f4.jpg')">
                        <img src="https://image2url.com/r2/default/images/1773866751399-f93751a0-62b4-4dd4-811d-3f02024650f4.jpg">
                        <div class="card-text">
                            <span>Chaap Tilak</span>
                            <small>Nakash Aziz</small>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="music-player">
            <div class="song-bar">
                <div class="song-details">
                    <img id="player-img" src="https://image2url.com/r2/default/images/1773862409110-24818e4e-59f9-486e-a461-b4f420786bf9.jpg" alt="">
                    <div class="text">
                        <h4 id="player-title">Teri Hogaiyaan</h4>
                        <p id="player-artist">Vishal Mishra</p>
                    </div>
                </div>
                <div class="player-icons">
                    <i class="fas fa-headphones-alt" style="color:#1db954"></i>
                    <i class="fas fa-play" id="masterPlay" onclick="togglePlay()"></i>
                    <i class="fas fa-times" onclick="closePlayer()" style="margin-left: 15px; cursor: pointer; color: #b3b3b3;"></i>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </footer>

        <nav class="bottom-menu">
            <div class="menu-item active"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="menu-item"><i class="fas fa-search"></i><span>Search</span></div>
            <div class="menu-item"><i class="fas fa-list-ul"></i><span>Your Library</span></div>
            <div class="menu-item"><i class="fas fa-plus-square"></i><span>Create</span></div>
        </nav>
    </div>
    <audio id="audioElement"></audio>
    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
